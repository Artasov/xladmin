name: Frontend

on:
  push:
    branches:
      - main
      - master
    tags:
      - "frontend-v*"
    paths:
      - "xladmin-frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "xladmin-frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xladmin-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: xladmin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Pack package
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/frontend-v')
    needs: test-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xladmin-frontend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Check tag version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#frontend-v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish --access public --provenance
