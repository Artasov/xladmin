name: XLAdmin Frontend
run-name: Frontend Release - ${{ github.ref_name }}

on:
  push:
    tags:
      - "frontend-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: xladmin-frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: xladmin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Pack packages
        run: npm run pack:dry-run

  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/frontend-v')
    needs: quality-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xladmin-frontend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Check tag version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#frontend-v}"
          for package in packages/xladmin-core packages/xladmin-next packages/xladmin-react-router; do
            PACKAGE_VERSION=$(node -p "require('./${package}/package.json').version")
            if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
              echo "${package} version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
              exit 1
            fi
          done

      - name: Build packages
        run: npm run build

      - name: Publish xladmin
        working-directory: xladmin-frontend/packages/xladmin-core
        run: npm publish --access public

      - name: Publish xladmin-next
        working-directory: xladmin-frontend/packages/xladmin-next
        run: npm publish --access public

      - name: Publish xladmin-react-router
        working-directory: xladmin-frontend/packages/xladmin-react-router
        run: npm publish --access public
