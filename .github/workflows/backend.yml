name: XLAdmin Backend
run-name: Backend Release · ${{ github.ref_name }}

on:
  push:
    tags:
      - "backend-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xladmin-backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy

      - name: Build package
        run: uv run python -m build

      - name: Check package metadata
        run: uv run python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: xladmin-backend-dist
          path: xladmin-backend/dist/

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/backend-v')
    needs: quality-checks
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check tag version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import pathlib, re
          content = pathlib.Path("xladmin-backend/pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              raise SystemExit("Version was not found in pyproject.toml")
          print(match.group(1))
          PY
          )
          TAG_VERSION="${GITHUB_REF_NAME#backend-v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "pyproject.toml version ($VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Download package artifacts
        uses: actions/download-artifact@v6
        with:
          name: xladmin-backend-dist
          path: xladmin-backend/dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: xladmin-backend/dist/
          skip-existing: true
          attestations: false
