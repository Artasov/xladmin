name: XLAdmin Backend
run-name: Backend Release · ${{ github.ref_name }}

on:
  push:
    tags:
      - "backend-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: xladmin_test
          POSTGRES_USER: xladmin_test
          POSTGRES_PASSWORD: xladmin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xladmin_test -d xladmin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: xladmin-backend
    env:
      XLADMIN_TEST_DATABASE_URL: postgresql+asyncpg://xladmin_test:xladmin_test@127.0.0.1:5432/xladmin_test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy

      - name: Build package
        run: uv run python -m build

      - name: Check package metadata
        run: uv run python -m twine check dist/*

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/backend-v')
    needs: quality-checks
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Check tag version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import pathlib, re
          content = pathlib.Path("xladmin-backend/pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              raise SystemExit("Version was not found in pyproject.toml")
          print(match.group(1))
          PY
          )
          TAG_VERSION="${GITHUB_REF_NAME#backend-v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "pyproject.toml version ($VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Sync dependencies
        run: uv sync --extra dev
        working-directory: xladmin-backend

      - name: Build package
        run: uv run python -m build
        working-directory: xladmin-backend

      - name: Mint PyPI API token
        shell: bash
        run: |
          OIDC_RESPONSE=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pypi")
          OIDC_TOKEN=$(python -c 'import json, sys; print(json.load(sys.stdin)["value"])' <<< "$OIDC_RESPONSE")
          MINT_RESPONSE=$(curl -sSf -X POST https://pypi.org/_/oidc/mint-token \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"${OIDC_TOKEN}\"}")
          API_TOKEN=$(python -c 'import json, sys; print(json.load(sys.stdin)["token"])' <<< "$MINT_RESPONSE")

          echo "::add-mask::${API_TOKEN}"
          echo "TWINE_USERNAME=__token__" >> "$GITHUB_ENV"
          echo "TWINE_PASSWORD=${API_TOKEN}" >> "$GITHUB_ENV"

      - name: Publish package distributions to PyPI
        run: uv run python -m twine upload --skip-existing dist/*
        working-directory: xladmin-backend
