name: XLAdmin Frontend Import Export
run-name: Frontend Import Export Release - ${{ github.ref_name }}

on:
  push:
    tags:
      - "frontend-import-export-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: xladmin-frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: xladmin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck import/export package
        run: npm run check --workspace ./packages/xladmin-import-export

      - name: Test import/export package
        run: npm run test --workspace ./packages/xladmin-import-export

      - name: Build import/export package
        run: npm run build --workspace ./packages/xladmin-import-export

      - name: Pack import/export package
        run: cd packages/xladmin-import-export && npm pack --dry-run

  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/frontend-import-export-v')
    needs: quality-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xladmin-frontend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Check tag version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#frontend-import-export-v}"
          PACKAGE_VERSION=$(node -p "require('./packages/xladmin-import-export/package.json').version")
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "xladmin-import-export version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build package
        run: npm run build --workspace ./packages/xladmin-import-export

      - name: Publish xladmin-import-export
        working-directory: xladmin-frontend/packages/xladmin-import-export
        run: npm publish --access public
